<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- Theme Toggle -->
  <button id="theme-toggle" class="theme-btn" title="Toggle theme">🌙</button>

  <div class="container">

    <!-- GREETING SECTION -->
    <header class="greeting-card card">
      <div class="greeting-top">
        <div>
          <div id="clock" class="clock">00:00:00</div>
          <div id="date-display" class="date-display">Loading...</div>
        </div>
        <div class="name-area">
          <span id="greeting-text" class="greeting-text">Hello!</span>
          <div class="name-edit">
            <input type="text" id="name-input" placeholder="Enter your name..." maxlength="30"/>
            <button id="save-name-btn">Save</button>
          </div>
        </div>
      </div>
    </header>

    <div class="grid-two">

      <!-- FOCUS TIMER -->
      <section class="card timer-card">
        <h2 class="card-title">⏱ Focus Timer</h2>
        <div class="timer-display">
          <span id="timer-display">25:00</span>
        </div>
        <div class="timer-duration-edit">
          <label>Duration (min):</label>
          <input type="number" id="pomodoro-input" value="25" min="1" max="120"/>
          <button id="set-duration-btn">Set</button>
        </div>
        <div class="timer-controls">
          <button id="start-btn" class="btn btn-primary">Start</button>
          <button id="stop-btn" class="btn btn-secondary">Stop</button>
          <button id="reset-btn" class="btn btn-ghost">Reset</button>
        </div>
        <div id="timer-status" class="timer-status"></div>
      </section>

      <!-- TO-DO LIST -->
      <section class="card todo-card">
        <h2 class="card-title">✅ Tasks</h2>
        <div class="todo-input-row">
          <input type="text" id="task-input" placeholder="Add a new task..." maxlength="80"/>
          <button id="add-task-btn" class="btn btn-primary">Add</button>
        </div>
        <div id="duplicate-warning" class="warning-msg" style="display:none">⚠️ Task already exists!</div>
        <ul id="task-list" class="task-list"></ul>
        <div id="task-count" class="task-count"></div>
      </section>

    </div>

    <!-- QUICK LINKS -->
    <section class="card links-card">
      <h2 class="card-title">🔗 Quick Links</h2>
      <div class="links-input-row">
        <input type="text" id="link-name-input" placeholder="Link name..." maxlength="30"/>
        <input type="url" id="link-url-input" placeholder="https://..." />
        <button id="add-link-btn" class="btn btn-primary">Add Link</button>
      </div>
      <div id="links-container" class="links-container"></div>
    </section>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
